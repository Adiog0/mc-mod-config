name: Build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Linux
  # ═══════════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pyinstaller PyQt6 tomlkit pyjson5 pyyaml

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --log-level=WARN build/build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc-config-editor-linux
          path: dist/mc-config-editor
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════
  # Windows
  # ═══════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 tomlkit pyjson5 pyyaml

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --log-level=WARN build/build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc-config-editor-windows
          path: dist/mc-config-editor.exe
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════
  # macOS
  # ═══════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pyinstaller PyQt6 tomlkit pyjson5 pyyaml

      - name: Generate .icns icon
        run: |
          bash build/generate-icns.sh

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --log-level=WARN build/build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc-config-editor-macos
          path: dist/mc-config-editor
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════
  # Release — attach binaries to GitHub Release
  # ═══════════════════════════════════════════════════════════════════════
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-24.04
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp artifacts/mc-config-editor-linux/mc-config-editor dist/mc-config-editor-linux
          cp artifacts/mc-config-editor-windows/mc-config-editor.exe dist/mc-config-editor-windows.exe
          cp artifacts/mc-config-editor-macos/mc-config-editor dist/mc-config-editor-macos
          tar -czf dist/mc-config-editor-linux.tar.gz -C artifacts/mc-config-editor-linux mc-config-editor
          tar -czf dist/mc-config-editor-macos.tar.gz -C artifacts/mc-config-editor-macos mc-config-editor
          tar -czf dist/mc-config-editor-windows.tar.gz -C artifacts/mc-config-editor-windows mc-config-editor.exe

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName')
          fi
          echo "Uploading to $TAG"
          gh release upload "$TAG" \
            dist/mc-config-editor-linux \
            dist/mc-config-editor-linux.tar.gz \
            dist/mc-config-editor-windows.exe \
            dist/mc-config-editor-windows.tar.gz \
            dist/mc-config-editor-macos \
            dist/mc-config-editor-macos.tar.gz \
            --clobber
